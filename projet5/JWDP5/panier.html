    <div class="container">
        <h1 class="text-center mt-2 h2">
            Validation de votre panier :
        </h1>
        <form action="http://localhost:3000/api/teddies/order" method="POST" id="formulaire" class="row border border-dark rounded m-2 pb-3">
            <div class="col-sm-6">
                    <div class="form-row">
                        <div class="col-md mt-4">
                            <label for="firstName">Prénom </label>
                            <input class="form-control" type="text" name="firstName" id="firstName" required>
                            <span></span>
                        </div>
                        <div class="col-md mt-4">
                            <label for="lastName">Nom de famille </label>
                            <input class="form-control" type="text" name="lastName" id="lastName" required>
                            <span></span>
                        </div>
                    </div>
                        <div class="form-row">
                        <div class="col-md mt-4">
                            <label for="adress">Adresse </label>
                            <input class="form-control" type="text" name="adress" id="adress" required>
                            <span></span>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="col-md mt-4">
                            <label for="cp">Code postal  </label>
                            <input class="form-control" type="number" name="cp" id="cp" required>
                            <span></span>
                        </div>
                        <div class="col-md mt-4">
                            <label for="city">Ville </label>
                            <input class="form-control" type="text" name="city" id="city" required>
                            <span></span>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="col-md mt-4">
                            <label for="email">E-mail </label>
                            <input class="form-control" type="email" name="email" id="email" required>
                            <span></span>
                        </div>
                    </div>
                    
            </div>
            <div class="col-sm-6 mt-4">
                <h2 class="h5">Récapitulatif de la commande :</h2>
                <div class="col mt-4">
                    <input id="submit-validation" class="btn btn-dark" type="submit" value="Commander">
                </div>
            </div>
        </form>
    </div>
